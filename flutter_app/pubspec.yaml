name: aegis_ai
description: AegisAI - Predictive Personal Safety System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Sensors and location
  sensors_plus: ^4.0.0
  geolocator: ^11.0.0
  permission_handler: ^11.0.0
  
  # SMS
  telephony: ^0.2.0
  
  # Storage
  shared_preferences: ^2.2.0
  
  # HTTP
  http: ^1.1.0
  
  # Background service
  flutter_foreground_task: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
